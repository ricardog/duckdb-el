name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Build fails on ubuntu due to a libstdc++ incompatibility.
        os: [macos-latest]
        emacs_version: ['28.2', '30.1']
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Emacs
      uses: purcell/setup-emacs@master
      with:
        version: ${{ matrix.emacs_version }}

    - name: Install system dependencies
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libstdc++6

          # Download DuckDB (Linux x64)
          wget https://github.com/duckdb/duckdb/releases/download/v1.1.3/libduckdb-linux-amd64.zip
          unzip libduckdb-linux-amd64.zip -d duckdb_install

          # Move headers and library to /usr/local which is a standard path
          sudo cp duckdb_install/duckdb.h /usr/local/include/
          sudo cp duckdb_install/libduckdb.so /usr/local/lib/

          sudo ldconfig
        else
          brew install cmake duckdb
        fi

    - name: Build with CMake
      run: |
        # Set up and run full CMake test suite
        mkdir -p build
        cd build
        cmake ..
        make
        cd ..

    - name: Run Core ERT Tests
      run: |
        # Run specific test files via Emacs directly as documented
        cd build
        ctest --output-on-failure
        cd ..
